name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "20.x"
          cache: npm
      - run: npm ci --no-audit --no-fund
      - run: npm ci --prefix worker --no-audit --no-fund
      - name: Resolve release version
        id: version
        run: |
          PKG_VERSION="$(node -p "require('./package.json').version")"
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            TAG_VERSION="${GITHUB_REF_NAME#v}"
            if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
              echo "Tag $GITHUB_REF_NAME does not match package.json version $PKG_VERSION" >&2
              exit 1
            fi
          fi
          echo "tag=v${PKG_VERSION}" >> "$GITHUB_OUTPUT"
      - name: Unit tests (offline)
        run: npm run test:unit
      - name: Safety model tests (offline)
        run: npm run test:safety
      - name: Worker tests (offline)
        run: npm test --prefix worker
      - name: Validate Worker bundle and Wrangler schema
        run: npx wrangler deploy --dry-run --outdir /tmp/ynab-worker-dry-run
        working-directory: worker
      - name: Release consistency check
        run: npm run release:check
      - name: Build MCPB bundle
        run: npm run build:mcpb
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
        run: |
          # On tag pushes the tag already exists; on workflow_dispatch,
          # gh creates the tag at the built commit.
          gh release create "$RELEASE_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "$RELEASE_TAG" \
            --generate-notes \
            dist/*.mcpb
