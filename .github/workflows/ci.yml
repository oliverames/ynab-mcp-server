name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: "22.x"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            worker/package-lock.json
      - run: npm ci --no-audit --no-fund
      - run: npm ci --prefix worker --no-audit --no-fund
      - name: Dependency audit
        run: npm audit --omit=dev --audit-level=high
      - name: Worker dependency audit
        run: npm audit --prefix worker --omit=dev --audit-level=high
      - name: Secret scan
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_COMMENTS: "false"

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ["18.x", "20.x", "22.x"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci --no-audit --no-fund
      - name: Syntax check
        run: node --check index.js
      - name: Unit tests (offline)
        run: npm run test:unit
      - name: Safety model tests (offline)
        run: npm run test:safety
      - name: Release consistency check
        run: npm run release:check
      - name: MCP smoke - list tools (discovery mode, no credentials)
        run: npm run smoke:list-tools
        env:
          YNAB_DISABLE_AGENT_CONFIG_FALLBACK: "1"

  worker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "22.x"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            worker/package-lock.json
      - run: npm ci --no-audit --no-fund
      - run: npm ci --prefix worker --no-audit --no-fund
      - name: Worker tests (offline)
        run: npm test
        working-directory: worker
      - name: Validate Worker bundle and Wrangler schema
        run: npx wrangler deploy --dry-run --outdir /tmp/ynab-worker-dry-run
        working-directory: worker
