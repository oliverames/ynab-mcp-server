name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ["18.x", "20.x", "22.x"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci --no-audit --no-fund
      - name: Syntax check
        run: node --check index.js
      - name: Unit tests (offline)
        run: npm run test:unit
      - name: Safety model tests (offline)
        run: npm run test:safety
      - name: Release consistency check
        run: npm run release:check
      - name: MCP smoke - list tools (discovery mode, no credentials)
        run: npm run smoke:list-tools
        env:
          YNAB_DISABLE_AGENT_CONFIG_FALLBACK: "1"
